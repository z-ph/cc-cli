# Claude Code Launcher CLI - 配置示例
#
# 复制所需配置到 ~/.claude/models.yaml 并填入你的 API key
#
# profiles: 统一的配置方案，通过 cc <id> 启动时自动生成 settings.<id>.json 并用 --settings 传入
#
# base 传导链: cc <id> 启动时，自动加载 全局base → 本地base → profile
# 优先级: profile > 本地 base > 全局 base
# 例如: 全局 base 定义共享 token，本地 base 覆盖 URL，profile 指定模型——三层配置自动合并

settings:
  alias: cc

# base: 所有 profiles 共享的默认配置（profile 中同名字段会覆盖 base）
# 全局 ~/.claude/models.yaml 的 base 会传导到本地项目的 profiles
# base:
#   env:
#     ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx    # 所有 profile 共享的默认 token
#   permissions:
#     deny:
#       - "Bash(rm -rf *)"                 # 所有 profile 都禁止的危险操作

profiles:
  # 国内：智谱 GLM
  glm51:
    env:
      ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/paas/v4
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
      ANTHROPIC_MODEL: glm-5.1

  # 国外：OpenAI
  gpt4:
    env:
      ANTHROPIC_BASE_URL: https://api.openai.com/v1
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
      ANTHROPIC_MODEL: gpt-4o

  # 本地：Ollama
  local:
    env:
      ANTHROPIC_BASE_URL: http://localhost:11434/v1
      ANTHROPIC_AUTH_TOKEN: ollama
      ANTHROPIC_MODEL: llama3.1

  # 严格模式：只允许读取
  strict:
    permissions:
      allow:
        - "Read"
      deny:
        - "Bash(rm *)"

  # 开发模式：允许常见开发操作
  dev:
    permissions:
      allow:
        - "Bash(npm run *)"
        - "Read"
        - "Write"

  # 混合模式：环境变量 + 权限
  dev-full:
    env:
      ANTHROPIC_BASE_URL: https://api.openai.com/v1
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
      ANTHROPIC_MODEL: gpt-4o
    permissions:
      allow:
        - "Bash(npm run *)"
        - "Read"
        - "Write"

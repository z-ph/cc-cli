# Claude Code Launcher CLI - 配置示例
#
# 复制所需配置到 ~/.claude/models.yaml 并填入你的 API key
#
# 字段直接使用 Claude Code 官方 settings 字段（model、env、permissions 等）
# base 中的值会合并到每个 config，config 中的值覆盖 base

settings:
  alias: cc

base:
  permissions:
    allow:
      - "Bash(npm run *)"
    deny:
      - "Read(./.env)"

configs:
  # 国内：智谱 GLM
  glm51:
    model: glm-5.1
    env:
      ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/paas/v4
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx

  # 国外：OpenAI
  gpt4:
    model: gpt-4o
    env:
      ANTHROPIC_BASE_URL: https://api.openai.com/v1
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx

  # 本地：Ollama
  local:
    model: llama3.1
    env:
      ANTHROPIC_BASE_URL: http://localhost:11434/v1
      ANTHROPIC_AUTH_TOKEN: ollama

  # 代理：OneAPI 转发
  proxy:
    model: gpt-4o
    env:
      ANTHROPIC_BASE_URL: https://oneapi.example.com/v1
      ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx

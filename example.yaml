# Claude Code Launcher CLI - 配置示例
#
# 复制所需配置到 ~/.claude/models.yaml 并填入你的 API key
#
# envs: 环境变量配置，通过 cc <id> 以 env 注入方式启动 Claude Code
# configs: Claude Code settings 配置，通过 cc use <id> 写入 settings 文件

settings:
  alias: cc

envs:
  # 国内：智谱 GLM
  glm51:
    ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/paas/v4
    ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
    ANTHROPIC_MODEL: glm-5.1

  # 国外：OpenAI
  gpt4:
    ANTHROPIC_BASE_URL: https://api.openai.com/v1
    ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
    ANTHROPIC_MODEL: gpt-4o

  # 本地：Ollama
  local:
    ANTHROPIC_BASE_URL: http://localhost:11434/v1
    ANTHROPIC_AUTH_TOKEN: ollama
    ANTHROPIC_MODEL: llama3.1

  # 代理：OneAPI 转发
  proxy:
    ANTHROPIC_BASE_URL: https://oneapi.example.com/v1
    ANTHROPIC_AUTH_TOKEN: sk-xxxxxxxx
    ANTHROPIC_MODEL: gpt-4o

configs:
  # 严格模式：只允许读取
  strict:
    permissions:
      allow:
        - "Read"
      deny:
        - "Bash(rm *)"

  # 开发模式：允许常见开发操作
  dev:
    permissions:
      allow:
        - "Bash(npm run *)"
        - "Read"
        - "Write"
